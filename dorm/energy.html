<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./assets/app.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="page"></div>

  <script>
    const bars = [15.2, 18.5, 22.1, 25.8, 19.3, 16.7, 14.9];
    const days = ['一', '二', '三', '四', '五', '六', '日'];
    const max = Math.max(...bars);

    document.getElementById('page').innerHTML =
      layoutStart('energy', '能源監控') +
      `
      <div class="p-6 max-w-7xl mx-auto">
        <div class="mb-8">
          <h1 class="text-3xl font-semibold text-gray-900 mb-2">能源監控</h1>
          <p class="text-gray-600">宿舍用電趨勢與節能建議</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <p class="text-gray-600 mb-1">今日用電</p>
            <p class="text-gray-900 text-2xl font-semibold">18.5 kWh</p>
          </div>
          <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <p class="text-gray-600 mb-1">本月累計</p>
            <p class="text-gray-900 text-2xl font-semibold">125.6 kWh</p>
          </div>
          <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <p class="text-gray-600 mb-1">預估月用量</p>
            <p class="text-gray-900 text-2xl font-semibold">434.7 kWh</p>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 mb-8">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-semibold text-gray-900">本週用電圖表</h2>
            <div class="text-sm text-gray-500">可接 Firebase / Node-RED 即時資料</div>
          </div>

          <div class="h-80 flex items-end gap-4 border border-gray-100 rounded-xl p-6 bg-gray-50 overflow-x-auto">
            ${bars.map((v, i) => `
              <div class="min-w-[64px] flex-1 flex flex-col justify-end items-center gap-3">
                <div class="w-full rounded-t-lg bg-blue-500" style="height:${Math.max(v / max * 200, 10)}px"></div>
                <div class="text-center">
                  <p class="text-sm text-gray-900 font-medium">${v}</p>
                  <p class="text-xs text-gray-500">${days[i]}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      ` +
      layoutEnd();

    initLayout();
  </script>
</body>
</html>
