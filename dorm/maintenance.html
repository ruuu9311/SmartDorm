<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>維修報修 - 智慧宿舍系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }
    .radio-label {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; font-size: 0.875rem; color: #374151;
    }
    .radio-label input[type="radio"] { accent-color: #2563eb; width: 16px; height: 16px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
<div id="page">
  <div class="flex items-center justify-center min-h-screen flex-col gap-4 text-gray-400">
    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p>載入中...</p>
  </div>
</div>

<script type="module">
import {
  auth, db, requireAuth,
  layoutStart, layoutEnd, initIcons, initLogout,
  collection, getDocs
} from './assets/app.js';

import {
  addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

// ── 公共區域位置選項 ──────────────────────────────────────────────────────────
const publicPlaces = [
  '1樓大廳', '1樓交誼廳', '2樓走廊', '2樓交誼廳',
  '1樓公共廁所（男）', '2樓公共廁所（男）', '1樓公共廁所（女）', '2樓公共廁所（女）', '洗衣間', '電梯', '其他'
];

const thingOptions = {
  room:   ['燈具', '冷氣', '門鎖', '窗戶', '床架/家具', '桌椅', '網路', '插座'],
  public: ['飲水機', '電梯', '走廊燈', '公共廁所', '公共冷氣', '消防設備', '門禁系統']
};

const reasonOptions = {
  room:   ['損壞/破裂', '無法正常運作', '漏水', '沒電/跳電', '異味/異音', '蟲害'],
  public: ['損壞/破裂', '無法正常運作', '漏水', '沒電/跳電', '設備老舊', '安全疑慮']
};

function getStatusBadge(status) {
  const map = {
    '處理中': '<span class="px-2 py-0.5 bg-orange-100 text-orange-700 rounded-full text-xs font-medium">處理中</span>',
    '已完成': '<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded-full text-xs font-medium">已完成</span>',
    '待處理': '<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">待處理</span>',
    '已取消': '<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded-full text-xs font-medium">已取消</span>'
  };
  return map[status] || `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">${status || '未知'}</span>`;
}

function getSideBadge(side) {
  if (!side) return '';
  return side.includes('公共')
    ? '<span class="px-2 py-0.5 bg-purple-100 text-purple-700 rounded-full text-xs font-medium">公共區域</span>'
    : '<span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full text-xs font-medium">房間內</span>';
}

function getPriorityBadge(priority) {
  const map = {
    '高': '<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded-full text-xs font-medium">🔴 高</span>',
    '中': '<span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded-full text-xs font-medium">🟡 中</span>',
    '低': '<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">⚪ 低</span>'
  };
  return map[priority] || '';
}

requireAuth(async user => {
  const studentId = localStorage.getItem('studentId');
  const cached    = JSON.parse(localStorage.getItem('currentUser') || 'null');
  const name = cached?.name || user.name || '使用者';
  const room = cached?.room || user.room || '—';
  const sid  = cached?.studentId || studentId || '';

  let records = [];
  try {
    const snap = await getDocs(collection(db, 'maintenance'));
    snap.forEach(d => records.push({ id: d.id, ...d.data() }));
    records.sort((a, b) => {
      const ta = a.time?.seconds || a.createdAt?.seconds || 0;
      const tb = b.time?.seconds || b.createdAt?.seconds || 0;
      return tb - ta;
    });
  } catch (err) {
    console.warn('[maintenance] 讀取失敗:', err.code);
  }

  const processing = records.filter(r => r.status === '處理中').length;
  const completed  = records.filter(r => r.status === '已完成').length;

  document.getElementById('page').innerHTML =
    layoutStart('maintenance', '維修報修', name, room, sid) +
    `<div class="p-6 max-w-6xl mx-auto">
      <div class="mb-8">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 class="text-3xl font-semibold text-gray-900 mb-2">維修報修</h1>
            <p class="text-gray-600">宿舍設備與公共設施報修管理</p>
          </div>
          <button id="openFormBtn"
            class="px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium">
            ＋ 新增報修
          </button>
        </div>
      </div>

      <!-- 新增報修表單 -->
      <div id="formCard" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 mb-8 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100">
          <h2 class="text-base font-semibold text-gray-900">維修報修表單</h2>
        </div>
        <form id="mForm" class="p-6 space-y-5">

          <!-- 報修位置類型 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              報修位置類型 <span class="text-red-500">*</span>
            </label>
            <div class="flex gap-6">
              <label class="radio-label">
                <input type="radio" name="mSide" value="房間內" checked> 房間內
              </label>
              <label class="radio-label">
                <input type="radio" name="mSide" value="公共區域"> 公共區域
              </label>
            </div>
          </div>

          <!-- 房間內：房號 + 床號 -->
          <div id="roomFields" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">
                房號 <span class="text-red-500">*</span>
              </label>
              <input id="mRoom" type="text" value="${room}"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">
                床號 <span class="text-red-500">*</span>
              </label>
              <select id="mBed"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-500">
                <option value="" disabled selected>請選擇床號</option>
                <option value="1">1 床</option>
                <option value="2">2 床</option>
                <option value="3">3 床</option>
                <option value="4">4 床</option>
              </select>
            </div>
          </div>

          <!-- 公共區域：位置下拉（預設隱藏） -->
          <div id="publicFields" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">
              公共區域位置 <span class="text-red-500">*</span>
            </label>
            <select id="mPlace"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-500">
              <option value="" disabled selected>請選擇位置</option>
              ${publicPlaces.map(p => `<option value="${p}">${p}</option>`).join('')}
            </select>
          </div>

          <!-- 損壞物品 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              損壞物品 <span class="text-red-500">*</span>
            </label>
            <select id="mThing" required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-500">
              <option value="" disabled selected>請選擇損壞物品</option>
            </select>
          </div>

          <!-- 損壞原因 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              損壞原因 <span class="text-red-500">*</span>
            </label>
            <select id="mReason" required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-500">
              <option value="" disabled selected>請選擇損壞原因</option>
            </select>
          </div>

          <!-- 詳細說明 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">詳細說明</label>
            <textarea id="mDesc" rows="4"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="請詳細描述問題狀況..."></textarea>
          </div>

          <!-- 緊急程度 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              緊急程度 <span class="text-red-500">*</span>
            </label>
            <div class="flex gap-6">
              <label class="radio-label">
                <input type="radio" name="mPriority" value="低"> 低
              </label>
              <label class="radio-label">
                <input type="radio" name="mPriority" value="中" checked> 中
              </label>
              <label class="radio-label">
                <input type="radio" name="mPriority" value="高"> 高
              </label>
            </div>
          </div>

          <div id="mMsg" class="hidden p-3 rounded-lg text-sm"></div>

          <div class="flex gap-3 pt-2">
            <button type="submit"
              class="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium text-sm">
              提交報修
            </button>
            <button type="button" id="cancelFormBtn"
              class="px-8 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm">
              取消
            </button>
          </div>
        </form>
      </div>

      <!-- 進度卡片 -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-xl p-5 border border-gray-100 shadow-sm">
          <p class="text-gray-500 text-sm">處理中</p>
          <p class="text-2xl font-bold text-orange-500 mt-1">${processing}
            <span class="text-base font-normal text-gray-400">件</span></p>
        </div>
        <div class="bg-white rounded-xl p-5 border border-gray-100 shadow-sm">
          <p class="text-gray-500 text-sm">已完成</p>
          <p class="text-2xl font-bold text-green-600 mt-1">${completed}
            <span class="text-base font-normal text-gray-400">件</span></p>
        </div>
        <div class="bg-white rounded-xl p-5 border border-gray-100 shadow-sm">
          <p class="text-gray-500 text-sm">總計</p>
          <p class="text-2xl font-bold text-gray-700 mt-1">${records.length}
            <span class="text-base font-normal text-gray-400">件</span></p>
        </div>
      </div>

      <!-- 報修卡片列表 -->
      ${records.length > 0 ? `
      <div class="space-y-4 mb-8">
        ${records.map(r => {
          const timeStr = r.time?.toDate
            ? r.time.toDate().toLocaleString('zh-TW')
            : (r.time || '');
          const locationStr = r.side === '公共區域'
            ? (r.place || '公共區域')
            : `${r.place || r.room || ''}${r.bed ? ' · ' + r.bed + ' 床' : ''}`;
          return `
          <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 hover:shadow-md transition-shadow">
            <div class="flex items-start justify-between mb-3">
              <div class="flex items-center gap-3 flex-wrap">
                <h3 class="text-gray-900 font-semibold">${r.thing || r.item || '—'}</h3>
                ${getStatusBadge(r.status)}
                ${getSideBadge(r.side)}
                ${getPriorityBadge(r.priority)}
              </div>
              <span class="text-gray-400 text-xs whitespace-nowrap ml-4">${timeStr}</span>
            </div>
            ${locationStr ? `<p class="text-gray-500 text-xs mb-2">📍 ${locationStr}</p>` : ''}
            <p class="text-gray-600 text-sm">${r.reason || '—'}</p>
            ${r.description ? `<p class="text-gray-500 text-xs mt-1">${r.description}</p>` : ''}
            ${r.ID || r.studentId ? `<p class="text-gray-400 text-xs mt-2">申請人學號：${r.ID || r.studentId}</p>` : ''}
          </div>`;
        }).join('')}
      </div>` : ''}

      <!-- 案件總表 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-200">
          <h2 class="text-xl font-semibold text-gray-900">案件總表 (${records.length})</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th class="text-left py-3 px-4 text-gray-600 font-medium">物品</th>
                <th class="text-left py-3 px-4 text-gray-600 font-medium">地點</th>
                <th class="text-left py-3 px-4 text-gray-600 font-medium">原因</th>
                <th class="text-left py-3 px-4 text-gray-600 font-medium">區域</th>
                <th class="text-left py-3 px-4 text-gray-600 font-medium">緊急</th>
                <th class="text-left py-3 px-4 text-gray-600 font-medium">狀態</th>
              </tr>
            </thead>
            <tbody>
              ${records.length === 0
                ? '<tr><td colspan="6" class="py-8 text-center text-gray-400">尚無報修紀錄</td></tr>'
                : records.map(r => {
                    const loc = r.side === '公共區域'
                      ? (r.place || '公共區域')
                      : `${r.place || r.room || '—'}${r.bed ? ' · ' + r.bed : ''}`;
                    return `
                    <tr class="border-b border-gray-100 hover:bg-gray-50">
                      <td class="py-3 px-4 font-medium">${r.thing || r.item || '—'}</td>
                      <td class="py-3 px-4 text-gray-600">${loc}</td>
                      <td class="py-3 px-4 text-gray-600 max-w-xs truncate">${r.reason || '—'}</td>
                      <td class="py-3 px-4 text-gray-600">${r.side || '—'}</td>
                      <td class="py-3 px-4">${getPriorityBadge(r.priority)}</td>
                      <td class="py-3 px-4">${getStatusBadge(r.status)}</td>
                    </tr>`;
                  }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>` +
    layoutEnd();

  initIcons();
  initLogout();

  // ── 填充損壞物品 / 損壞原因下拉 ──────────────────────────────────────────
  function fillSelects(type) {
    const thingSel  = document.getElementById('mThing');
    const reasonSel = document.getElementById('mReason');
    thingSel.innerHTML  = '<option value="" disabled selected>請選擇損壞物品</option>' +
      thingOptions[type].map(t => `<option value="${t}">${t}</option>`).join('');
    reasonSel.innerHTML = '<option value="" disabled selected>請選擇損壞原因</option>' +
      reasonOptions[type].map(r => `<option value="${r}">${r}</option>`).join('');
  }

  fillSelects('room'); // 預設房間內

  // ── 位置類型切換：顯示/隱藏對應欄位 ─────────────────────────────────────
  document.querySelectorAll('input[name="mSide"]').forEach(radio => {
    radio.addEventListener('change', e => {
      const isPublic = e.target.value === '公共區域';

      // 切換房間 / 公共欄位顯示
      document.getElementById('roomFields').classList.toggle('hidden', isPublic);
      document.getElementById('publicFields').classList.toggle('hidden', !isPublic);

      // 切換必填
      document.getElementById('mRoom').required = !isPublic;
      document.getElementById('mBed').required  = !isPublic;
      document.getElementById('mPlace').required = isPublic;

      fillSelects(isPublic ? 'public' : 'room');
    });
  });

  // 預設房間內為必填
  document.getElementById('mRoom').required  = true;
  document.getElementById('mBed').required   = true;
  document.getElementById('mPlace').required = false;

  // ── 表單開關 ──────────────────────────────────────────────────────────────
  document.getElementById('openFormBtn').addEventListener('click', () => {
    document.getElementById('formCard').classList.remove('hidden');
    document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
  });
  document.getElementById('cancelFormBtn').addEventListener('click', () => {
    document.getElementById('formCard').classList.add('hidden');
    document.getElementById('mMsg').classList.add('hidden');
  });

  // ── 送出報修 ──────────────────────────────────────────────────────────────
  document.getElementById('mForm').addEventListener('submit', async e => {
    e.preventDefault();
    const msg    = document.getElementById('mMsg');
    const btn    = e.target.querySelector('button[type="submit"]');
    const side   = document.querySelector('input[name="mSide"]:checked')?.value || '房間內';
    const pri    = document.querySelector('input[name="mPriority"]:checked')?.value || '中';
    const isPublic = side === '公共區域';

    btn.textContent = '送出中...';
    btn.disabled = true;

    try {
      await addDoc(collection(db, 'maintenance'), {
        ID:          sid,
        name:        name,
        // 房間內用 room+bed，公共區域用 place
        room:        isPublic ? '' : document.getElementById('mRoom').value,
        bed:         isPublic ? '' : document.getElementById('mBed').value,
        place:       isPublic ? document.getElementById('mPlace').value : '',
        side:        side,
        thing:       document.getElementById('mThing').value,
        reason:      document.getElementById('mReason').value,
        description: document.getElementById('mDesc').value,
        priority:    pri,
        status:      '處理中',
        time:        serverTimestamp()
      });
      msg.textContent = '✅ 報修申請已送出！';
      msg.className = 'p-3 rounded-lg text-sm bg-green-50 text-green-700';
      msg.classList.remove('hidden');
      e.target.reset();
      // 重設回房間內預設狀態
      document.getElementById('roomFields').classList.remove('hidden');
      document.getElementById('publicFields').classList.add('hidden');
      fillSelects('room');
      setTimeout(() => location.reload(), 2000);
    } catch (err) {
      msg.textContent = '❌ 送出失敗：' + err.message;
      msg.className = 'p-3 rounded-lg text-sm bg-red-50 text-red-700';
      msg.classList.remove('hidden');
      btn.textContent = '提交報修';
      btn.disabled = false;
    }
  });
});
</script>
</body>
</html>
