<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./assets/app.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="page"></div>

  <script>
    document.getElementById('page').innerHTML =
      layoutStart('maintenance', '維修報修') +
      `
      <div class="p-6 max-w-6xl mx-auto">
        <div class="mb-8">
          <div class="flex items-center justify-between">
            <div>
              <h1 class="text-3xl font-semibold text-gray-900 mb-2">維修報修</h1>
              <p class="text-gray-600">宿舍設備與公共設施報修管理</p>
            </div>
            <button class="px-4 py-3 bg-blue-600 text-white rounded-lg">新增報修</button>
          </div>
        </div>

        <div class="space-y-4 mb-8">
          ${mock.maintenanceRecords.map(record => `
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 card-hover">
              <div class="flex items-start justify-between mb-4">
                <div>
                  <div class="flex items-center gap-3 mb-2">
                    <h3 class="text-gray-900 font-semibold">${record.ticketNumber}</h3>
                    ${getStatusBadge(record.status)}
                    ${getPriorityBadge(record.priority)}
                  </div>
                  <p class="text-gray-600 text-sm">${record.location}｜${record.damagedItem}｜${record.damageReason}</p>
                </div>
              </div>
              <p class="text-gray-500 text-sm">送出時間：${record.submitDate} ${record.submitTime}</p>
            </div>
          `).join('')}
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="p-6 border-b border-gray-200">
            <h2 class="text-xl font-semibold text-gray-900">案件總表</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="text-left py-3 px-4 text-gray-600">工單</th>
                  <th class="text-left py-3 px-4 text-gray-600">位置</th>
                  <th class="text-left py-3 px-4 text-gray-600">項目</th>
                  <th class="text-left py-3 px-4 text-gray-600">時間</th>
                  <th class="text-left py-3 px-4 text-gray-600">狀態</th>
                  <th class="text-left py-3 px-4 text-gray-600">優先級</th>
                </tr>
              </thead>
              <tbody>
                ${mock.maintenanceRecords.map(record => `
                  <tr class="border-b border-gray-100">
                    <td class="py-3 px-4">${record.ticketNumber}</td>
                    <td class="py-3 px-4">${record.location}</td>
                    <td class="py-3 px-4">${record.damagedItem}</td>
                    <td class="py-3 px-4">${record.submitDate} ${record.submitTime}</td>
                    <td class="py-3 px-4">${getStatusBadge(record.status)}</td>
                    <td class="py-3 px-4">${getPriorityBadge(record.priority)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      ` +
      layoutEnd();

    initLayout();
  </script>
</body>
</html>
