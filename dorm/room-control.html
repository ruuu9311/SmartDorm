<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>房間控制 - 智慧宿舍系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<div id="page">
  <div class="flex items-center justify-center min-h-screen flex-col gap-4 text-gray-400">
    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p>載入中...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAs6t5RsKjIr0mJEI6gnk579AIcG-_FJ_I",
    authDomain: "smartdorm-3ab79.firebaseapp.com",
    projectId: "smartdorm-3ab79",
    storageBucket: "smartdorm-3ab79.firebasestorage.app",
    messagingSenderId: "240227925869",
    appId: "1:240227925869:web:5a71f95a2f18bef1972464"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const studentId = localStorage.getItem('studentId');
  if (!studentId) {
    window.location.href = './login.html';
    throw new Error('未登入');
  }

  const cachedUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
  let userData = {
    name: cachedUser?.name || '使用者',
    room: cachedUser?.room || '—',
    sid:  cachedUser?.studentId || studentId
  };

  let shellBuilt = false;

  const defaultControl = {
    light: false,
    door: true,
    ac:   true,
    fan:  false
  };

  let controlState = { ...defaultControl };

  const scenes = {
    morning: {
      name: '早晨模式',
      desc: '開燈、上鎖，清爽迎接早晨',
      icon: 'sun',
      iconWrap: 'bg-blue-50 text-blue-600',
      state: { light: true, door: true, ac: false, fan: false }
    },
    sleep: {
      name: '睡眠模式',
      desc: '關燈、上鎖、關冷氣，好眠',
      icon: 'moon',
      iconWrap: 'bg-blue-50 text-blue-600',
      state: { light: false, door: true, ac: false, fan: false }
    },
    study: {
      name: '讀書模式',
      desc: '開燈、上鎖、開冷氣，專心學習',
      icon: 'book-open',
      iconWrap: 'bg-blue-50 text-blue-600',
      state: { light: true, door: true, ac: true, fan: false }
    },
    relax: {
      name: '放鬆模式',
      desc: '開燈、解鎖、開風扇，輕鬆休息',
      icon: 'sofa',
      iconWrap: 'bg-blue-50 text-blue-600',
      state: { light: true, door: false, ac: false, fan: true }
    }
  };

  function initIcons() {
    if (window.lucide) window.lucide.createIcons();
  }

  function bindLogout() {
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.removeItem('studentId');
      localStorage.removeItem('currentUser');
      window.location.href = './login.html';
    });
  }

  function switchClass(isOn, activeColor = 'bg-cyan-500') {
    return `
      relative inline-flex h-7 w-12 items-center rounded-full transition-colors
      ${isOn ? activeColor : 'bg-gray-300'}
    `;
  }

  function knobClass(isOn) {
    return `
      inline-block h-5 w-5 transform rounded-full bg-white transition
      ${isOn ? 'translate-x-6' : 'translate-x-1'}
    `;
  }

  function deviceStatusLabel(key, value) {
    if (key === 'door') return value ? '已上鎖' : '已解鎖';
    if (key === 'ac')   return value ? '運轉中' : '已關閉';
    if (key === 'fan')  return value ? '運轉中' : '已關閉';
    return value ? '已開啟' : '已關閉';
  }

  function renderMainContent() {
    const deviceCards = [
      { key: 'light', title: '電燈',   icon: 'lightbulb', activeColor: 'bg-cyan-500' },
      { key: 'door',  title: '門鎖',   icon: 'lock',      activeColor: 'bg-blue-500' },
      { key: 'ac',    title: '冷氣',   icon: 'wind',      activeColor: 'bg-cyan-500' },
      { key: 'fan',   title: '電風扇', icon: 'fan',       activeColor: 'bg-cyan-500' }
    ];

    return `
      <section class="mb-10">
        <div class="flex items-center justify-between mb-5">
          <h3 class="text-2xl font-bold text-gray-900">情境模式</h3>
        </div>
        <p class="text-sm text-gray-500 mb-4">
          可快速套用預先設定好的房間狀態，一鍵完成燈光、門鎖、冷氣與風扇的調整。
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
          ${Object.entries(scenes).map(([sceneKey, scene]) => `
            <button
              type="button"
              data-scene="${sceneKey}"
              class="scene-btn text-left bg-white rounded-2xl border border-gray-200 shadow-sm p-6 hover:shadow-md hover:-translate-y-0.5 transition-all">
              <div class="flex items-start gap-4">
                <div class="w-12 h-12 rounded-xl ${scene.iconWrap} flex items-center justify-center shrink-0">
                  <i data-lucide="${scene.icon}" class="w-6 h-6"></i>
                </div>
                <div>
                  <h4 class="text-lg font-semibold text-gray-900 mb-2">${scene.name}</h4>
                  <p class="text-sm leading-6 text-gray-500">${scene.desc}</p>
                </div>
              </div>
            </button>
          `).join('')}
        </div>
      </section>

      <section class="mb-8">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-2xl font-bold text-gray-900">設備控制</h3>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          ${deviceCards.map(device => `
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm px-6 py-5">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                  <div class="w-11 h-11 rounded-xl bg-gray-50 flex items-center justify-center text-gray-600">
                    <i data-lucide="${device.icon}" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <h4 class="text-lg font-semibold text-gray-900">${device.title}</h4>
                    <p class="text-sm text-gray-500">${deviceStatusLabel(device.key, controlState[device.key])}</p>
                  </div>
                </div>

                <button
                  type="button"
                  data-device="${device.key}"
                  class="${switchClass(controlState[device.key], device.activeColor)}">
                  <span class="${knobClass(controlState[device.key])}"></span>
                </button>
              </div>
            </div>
          `).join('')}
        </div>
      </section>

      <div class="rounded-2xl border border-green-100 bg-green-50 px-5 py-4 text-green-700 text-sm">
        <div class="flex items-center gap-2">
          <i data-lucide="circle-check-big" class="w-4 h-4"></i>
          <span>Firebase 已連接，設備狀態即時同步。</span>
        </div>
      </div>
    `;
  }

  function renderShell() {
    shellBuilt = true;
    document.getElementById('page').innerHTML = `
      <div class="flex min-h-screen">
        <!-- 側邊欄 -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed inset-y-0 left-0 z-10">
          <div class="p-6 border-b border-gray-100">
            <a href="./dashboard.html"
               class="flex items-center gap-3 rounded-lg px-2 py-1 -mx-2 hover:bg-blue-50 cursor-pointer transition-colors">
              <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                <i data-lucide="house" class="w-5 h-5 text-white"></i>
              </div>
              <div>
                <p class="font-semibold text-gray-900 text-sm">智慧宿舍系統</p>
                <p class="text-xs text-gray-400">Smart Dorm</p>
              </div>
            </a>
          </div>

          <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="./dashboard.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="layout-dashboard" class="w-4 h-4"></i> 首頁 Dashboard
            </a>
            <a href="./room-control.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 text-blue-600 text-sm font-medium">
              <i data-lucide="home" class="w-4 h-4"></i> 房間控制
            </a>
            <a href="./energy.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="zap" class="w-4 h-4"></i> 能源監控
            </a>
            <a href="./package.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="package" class="w-4 h-4"></i> 包裹管理
            </a>
            <a href="./maintenance.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="wrench" class="w-4 h-4"></i> 維修報修
            </a>
            <a href="./visitor.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="users" class="w-4 h-4"></i> 訪客管理
            </a>
            <a href="./medical.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="heart-pulse" class="w-4 h-4"></i> 緊急通知
            </a>
          </nav>

          <div class="p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p id="sidebar-name" class="text-sm font-medium text-gray-900 truncate">${userData.name}</p>
                <p id="sidebar-room" class="text-xs text-gray-400 truncate">${userData.room}</p>
              </div>
            </div>
            <button id="logoutBtn"
              class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-gray-500 hover:bg-red-50 hover:text-red-600 text-sm transition-colors">
              <i data-lucide="log-out" class="w-4 h-4"></i> 登出
            </button>
          </div>
        </aside>

        <!-- 右側主內容 -->
        <div class="flex-1 flex flex-col ml-64 min-h-screen">
          <header class="bg-gray-50 border-b border-gray-200 px-6 py-5 sticky top-0 z-10">
            <h1 class="text-xl font-bold text-gray-900">房間控制</h1>
            <p class="text-lg text-gray-500 mt-1">${userData.room}｜${userData.sid}</p>
          </header>

          <main id="main-content" class="p-8 max-w-[1500px] mx-auto w-full">
            ${renderMainContent()}
          </main>
        </div>
      </div>
    `;

    initIcons();
    bindLogout();
    bindControls();
  }

  function updateContent() {
    if (!shellBuilt) {
      renderShell();
      return;
    }

    const mainEl = document.getElementById('main-content');
    if (mainEl) mainEl.innerHTML = renderMainContent();

    const nameEl = document.getElementById('sidebar-name');
    const roomEl = document.getElementById('sidebar-room');
    if (nameEl) nameEl.textContent = userData.name;
    if (roomEl) roomEl.textContent = userData.room;

    initIcons();
    bindControls();
  }

  async function saveControlState() {
    const roomKey = userData.room && userData.room !== '—' ? userData.room : studentId;
    await setDoc(doc(db, 'roomControl', roomKey), {
      room: userData.room || '',
      studentId,
      ...controlState,
      updatedAt: new Date().toISOString()
    }, { merge: true });
  }

  function bindControls() {
    document.querySelectorAll('[data-device]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const key = btn.dataset.device;
        controlState[key] = !controlState[key];
        updateContent();
        try {
          await saveControlState();
        } catch (error) {
          console.error('儲存裝置狀態失敗:', error);
        }
      });
    });

    document.querySelectorAll('[data-scene]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const sceneKey = btn.dataset.scene;
        controlState = { ...controlState, ...scenes[sceneKey].state };
        updateContent();
        try {
          await saveControlState();
        } catch (error) {
          console.error('儲存情境模式失敗:', error);
        }
      });
    });
  }

  renderShell();

  onSnapshot(doc(db, 'users', studentId), async (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      userData = {
        name: d.name || cachedUser?.name || '使用者',
        room: d.room || cachedUser?.room || '—',
        sid:  d.studentId || studentId
      };

      localStorage.setItem('currentUser', JSON.stringify({
        id: studentId,
        studentId: d.studentId || studentId,
        name: d.name || '',
        room: d.room || '',
        bed: d.bed || '',
        class: d.class || ''
      }));

      const roomKey = userData.room && userData.room !== '—' ? userData.room : studentId;
      try {
        const roomSnap = await getDoc(doc(db, 'roomControl', roomKey));
        if (roomSnap.exists()) {
          controlState = { ...defaultControl, ...roomSnap.data() };
        }
      } catch (error) {
        console.error('讀取房間控制資料失敗:', error);
      }

      // 更新 header 上的 room｜sid
      const header = document.querySelector('header');
      if (header) {
        const p = header.querySelector('p');
        if (p) p.textContent = `${userData.room}｜${userData.sid}`;
      }

      updateContent();
    }
  }, (error) => {
    console.error('讀取使用者資料失敗:', error);
  });
</script>
</body>
</html>
