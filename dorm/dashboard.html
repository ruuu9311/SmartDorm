<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - 智慧宿舍系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<div id="page">
  <div class="flex items-center justify-center min-h-screen flex-col gap-4 text-gray-400">
    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p>載入中...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getFirestore, doc, collection, onSnapshot, getDoc, getDocs
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAs6t5RsKjIr0mJEI6gnk579AIcG-_FJ_I",
    authDomain: "smartdorm-3ab79.firebaseapp.com",
    projectId: "smartdorm-3ab79",
    storageBucket: "smartdorm-3ab79.firebasestorage.app",
    messagingSenderId: "240227925869",
    appId: "1:240227925869:web:5a71f95a2f18bef1972464"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);

  const studentId = localStorage.getItem('studentId');
  if (!studentId) {
    window.location.href = './login.html';
  }

  const cachedUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
  let userData = {
    name: cachedUser?.name || '使用者',
    room: cachedUser?.room || '—',
    sid: cachedUser?.studentId || studentId
  };

  let statsData = { pkgCount: 0, visCount: 0, mntCount: 0 };
  let activities = [];
  let shellBuilt = false;

  function initIcons() {
    if (window.lucide) window.lucide.createIcons();
  }

  function bindLogout() {
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.removeItem('studentId');
      localStorage.removeItem('currentUser');
      window.location.href = './login.html';
    });
  }

  // 依時間回傳打招呼
  function getGreeting() {
    const now = new Date();
    const hour = now.getHours();
    if (hour >= 5 && hour < 11) return '早安';
    if (hour >= 11 && hour < 14) return '中午好';
    if (hour >= 14 && hour < 18) return '下午好';
    return '晚安';
  }

  function renderContent() {
    const cards = [
      {
        title: '待領包裹',
        value: statsData.pkgCount,
        unit: '件',
        icon: 'package',
        color: 'bg-blue-500',
        href: './package.html',
        desc: '查看目前尚未領取的包裹'
      },
      {
        title: '訪客申請',
        value: statsData.visCount,
        unit: '筆',
        icon: 'users',
        color: 'bg-green-500',
        href: './visitor.html',
        desc: '管理訪客預約與審核狀態'
      },
      {
        title: '維修案件',
        value: statsData.mntCount,
        unit: '件',
        icon: 'wrench',
        color: 'bg-orange-500',
        href: './maintenance.html',
        desc: '查看房間與公共區域報修'
      },
      {
        title: '緊急醫療通報',
        value: '立即',
        unit: '',
        icon: 'heart-pulse',
        color: 'bg-red-500',
        href: './medical.html',
        desc: '身體不適或緊急狀況時，可快速進入醫療通知頁面。'
      }
    ];

    return `
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-7 mb-10">
        ${cards.map(card => `
          <a href="${card.href}"
             class="group bg-white rounded-2xl shadow-sm p-6 md:p-7 border border-gray-100 hover:shadow-md hover:-translate-y-0.5 transition-all flex flex-col justify-between min-h-[190px]">
            <div class="flex items-start justify-between mb-5">
              <div class="${card.color} p-3.5 rounded-xl inline-flex shadow-sm">
                <i data-lucide="${card.icon}" class="w-6 h-6 text-white"></i>
              </div>
              <i data-lucide="arrow-up-right"
                 class="w-5 h-5 text-gray-300 group-hover:text-blue-500 transition-colors"></i>
            </div>

            <div>
              <h3 class="text-gray-900 text-base font-semibold mb-2">${card.title}</h3>
              <p class="text-gray-500 text-sm leading-6 mb-4">${card.desc}</p>
              <div class="flex items-baseline gap-2">
                <span class="text-2xl md:text-3xl font-bold text-gray-900">${card.value}</span>
                ${card.unit ? `<span class="text-gray-400 text-sm">${card.unit}</span>` : ''}
              </div>
            </div>
          </a>
        `).join('')}
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-7 border border-gray-100">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-semibold text-gray-900">近期活動</h2>
          <span class="text-xs text-gray-400">Latest</span>
        </div>

        ${activities.length === 0
          ? `<div class="flex flex-col items-center py-12 text-gray-400">
               <i data-lucide="bell-off" class="w-9 h-9 mb-3"></i>
               <p class="text-sm">尚無近期活動紀錄</p>
             </div>`
          : `<div class="space-y-3">
               ${activities.map(a => `
                 <div class="flex items-start gap-4 p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition-colors">
                   <div class="bg-blue-50 text-blue-600 p-2.5 rounded-lg flex-shrink-0">
                     <i data-lucide="bell" class="w-4 h-4"></i>
                   </div>
                   <div>
                     <p class="text-gray-900 font-medium text-sm">${a.title || ''}</p>
                     <p class="text-gray-500 text-sm mt-1 leading-6">${a.description || ''}</p>
                   </div>
                 </div>
               `).join('')}
             </div>`
        }
      </div>`;
  }

  // 渲染 Header 內容的函數
  function renderHeader() {
    const greet = getGreeting();
    return `
      <div class="flex flex-col gap-1">
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-gray-900">
          ${greet}，${userData.name}
        </h1>
        <p class="text-sm md:text-base text-gray-400">
          房間號碼：${userData.room}｜學號：${userData.sid}
        </p>
      </div>
    `;
  }

  function renderShell() {
    shellBuilt = true;
    document.getElementById('page').innerHTML = `
      <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed inset-y-0 left-0 z-10">
          <div class="p-6 border-b border-gray-100">
            <a href="./dashboard.html"
               class="flex items-center gap-3 rounded-lg px-2 py-1 -mx-2 hover:bg-blue-50 cursor-pointer transition-colors">
              <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                <i data-lucide="house" class="w-5 h-5 text-white"></i>
              </div>
              <div>
                <p class="font-semibold text-gray-900 text-sm">智慧宿舍系統</p>
                <p class="text-xs text-gray-400">Smart Dorm</p>
              </div>
            </a>
          </div>

          <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="./dashboard.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 text-blue-600 text-sm font-medium">
              <i data-lucide="layout-dashboard" class="w-4 h-4"></i> 首頁 Dashboard
            </a>
            <a href="./room-control.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="home" class="w-4 h-4"></i> 房間控制
            </a>
            <a href="./energy.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="zap" class="w-4 h-4"></i> 能源監控
            </a>
            <a href="./package.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="package" class="w-4 h-4"></i> 包裹管理
            </a>
            <a href="./maintenance.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="wrench" class="w-4 h-4"></i> 維修報修
            </a>
            <a href="./visitor.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="users" class="w-4 h-4"></i> 訪客管理
            </a>
            <a href="./medical.html"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
              <i data-lucide="heart-pulse" class="w-4 h-4"></i> 緊急通知
            </a>
          </nav>

          <div class="p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p id="sidebar-name" class="text-sm font-medium text-gray-900 truncate">${userData.name}</p>
                <p id="sidebar-room" class="text-xs text-gray-400 truncate">${userData.room}</p>
              </div>
            </div>
            <button id="logoutBtn"
              class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-gray-500 hover:bg-red-50 hover:text-red-600 text-sm transition-colors">
              <i data-lucide="log-out" class="w-4 h-4"></i> 登出
            </button>
          </div>
        </aside>

        <div class="flex-1 flex flex-col ml-64 min-h-screen">
          <header id="dynamic-header" class="bg-gray-50 border-b border-gray-200 px-8 py-6 sticky top-0 z-10">
            ${renderHeader()}
          </header>

          <main id="main-content" class="p-8 max-w-[1500px] mx-auto w-full">
            ${renderContent()}
          </main>
        </div>
      </div>`;
    initIcons();
    bindLogout();
  }

  function updateContent() {
    if (!shellBuilt) {
      renderShell();
      return;
    }

    const headerEl = document.getElementById('dynamic-header');
    if (headerEl) headerEl.innerHTML = renderHeader();

    const mainEl = document.getElementById('main-content');
    if (mainEl) mainEl.innerHTML = renderContent();

    const nameEl = document.getElementById('sidebar-name');
    const roomEl = document.getElementById('sidebar-room');

    if (nameEl) nameEl.textContent = userData.name;
    if (roomEl) roomEl.textContent = userData.room;

    initIcons();
  }

  renderShell();

  function tryOnSnapshot(ref, onData, colName) {
    const unsub = onSnapshot(ref, onData, (err) => {
      console.warn(`[${colName}] 監聽失敗:`, err.code);
      unsub();
    });
  }

  tryOnSnapshot(
    doc(db, 'users', studentId),
    (snap) => {
      if (!snap.exists()) return;
      const d = snap.data();
      userData = {
        name: d.name || cachedUser?.name || '使用者',
        room: d.room || cachedUser?.room || '—',
        sid: d.studentId || studentId
      };
      localStorage.setItem('currentUser', JSON.stringify({ ...d, id: studentId }));
      updateContent();
    },
    'users'
  );

  tryOnSnapshot(
    collection(db, 'packages'),
    (snap) => {
      statsData.pkgCount = snap.docs.filter(d => d.data().status === 'waiting').length;
      updateContent();
    },
    'packages'
  );

  tryOnSnapshot(
    collection(db, 'visitor'),
    (snap) => {
      statsData.visCount = snap.docs.filter(d => ['pending', 'approved'].includes(d.data().status)).length;
      updateContent();
    },
    'visitor'
  );

  tryOnSnapshot(
    collection(db, 'maintenance'),
    (snap) => {
      statsData.mntCount = snap.docs.filter(d => d.data().status === 'processing' || d.data().status === '處理中').length;
      updateContent();
    },
    'maintenance'
  );

  tryOnSnapshot(
    collection(db, 'activities'),
    (snap) => {
      activities = snap.docs.map(d => d.data()).slice(0, 5);
      updateContent();
    },
    'activities'
  );
</script>
</body>
</html>
