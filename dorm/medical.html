<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>醫療緊急通知 - 智慧宿舍系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body { font-family: 'Noto Sans TC', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">
<div id="page">
  <div class="flex items-center justify-center min-h-screen flex-col gap-4 text-gray-400">
    <div class="w-8 h-8 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div>
    <p>載入中...</p>
  </div>
</div>

<script type="module">
import {
  auth, db, requireAuth,
  layoutStart, layoutEnd, initIcons, initLogout,
  collection, getDocs
} from './assets/app.js';

import {
  addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

// ── Badge 函式（放在 requireAuth 外，template 才能存取）──────────────────────
function getStatusBadge(status) {
  const map = {
    processing: '<span class="px-2 py-0.5 bg-orange-100 text-orange-700 rounded-full text-xs font-medium">處理中</span>',
    completed:  '<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded-full text-xs font-medium">已完成</span>',
    pending:    '<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">待處理</span>',
    cancelled:  '<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded-full text-xs font-medium">已取消</span>'
  };
  return map[status] || `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">${status || '未知'}</span>`;
}

requireAuth(async user => {
  // Step 1: 從 localStorage 快取取使用者資料
  const studentId = localStorage.getItem('studentId');
  const cached    = JSON.parse(localStorage.getItem('currentUser') || 'null');
  const name      = cached?.name      || user.name      || '使用者';
  const room      = cached?.room      || user.room      || '—';
  const sid       = cached?.studentId || studentId      || '';
  const bloodType = cached?.bloodType || '—';

  // Step 2: 讀醫療紀錄
  let records = [];
  try {
    const snap = await getDocs(collection(db, 'medical'));
    snap.forEach(d => records.push({ id: d.id, ...d.data() }));
  } catch (err) {
    console.warn('[medical] 讀取失敗:', err.code);
  }

  // Step 3: 渲染頁面
  document.getElementById('page').innerHTML =
    layoutStart('medical', '醫療緊急通知', name, room, sid) +
    `<div class="p-6 max-w-6xl mx-auto">
      <div class="mb-8">
        <h1 class="text-3xl font-semibold text-gray-900 mb-2">醫療緊急通知</h1>
        <p class="text-gray-600">緊急求助與醫療紀錄中心</p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <!-- 緊急求助按鈕 -->
        <div class="bg-gradient-to-br from-red-50 to-red-100 rounded-xl shadow-lg p-8 border border-red-200">
          <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-500 rounded-full mb-4">
              <i data-lucide="heart" class="w-8 h-8 text-white"></i>
            </div>
            <h2 class="text-red-900 text-2xl font-semibold mb-3">緊急求助</h2>
            <p class="text-red-700 mb-6 text-sm">一鍵發送宿舍管理員與醫療單位通知</p>
            <div id="emergencyMsg" class="hidden mb-4 p-3 rounded-lg text-sm"></div>
            <button id="emergencyBtn"
              class="w-full px-8 py-6 bg-red-600 text-white rounded-xl hover:bg-red-700 transition-colors shadow-lg font-semibold text-lg">
              🚨 啟動緊急通報
            </button>
            <p class="text-red-500 text-xs mt-3">按下後將啟動 3 秒倒數，再次點擊可取消</p>
          </div>
        </div>

        <div class="space-y-6">
          <!-- 緊急聯絡 -->
          <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <h3 class="text-gray-900 text-xl font-semibold mb-4">緊急聯絡</h3>
            <div class="space-y-3 text-sm">
              <div class="p-4 bg-red-50 rounded-lg font-medium text-red-800">🚑 119 緊急救護</div>
              <div class="p-4 bg-blue-50 rounded-lg text-blue-800">📞 宿舍管理室：02-1234-5678</div>
              <div class="p-4 bg-green-50 rounded-lg text-green-800">🏥 校園健康中心：02-8765-4321</div>
            </div>
          </div>

          <!-- 個人資料 -->
          <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <h3 class="text-gray-900 text-xl font-semibold mb-4">個人資料</h3>
            <div class="space-y-3 text-sm">
              <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                <span class="text-gray-600">姓名</span>
                <span class="text-gray-900 font-medium">${name}</span>
              </div>
              <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                <span class="text-gray-600">房號</span>
                <span class="text-gray-900 font-medium">${room}</span>
              </div>
              <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                <span class="text-gray-600">血型</span>
                <span class="text-gray-900 font-medium">${bloodType}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 醫療紀錄 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-200">
          <h2 class="text-xl font-semibold text-gray-900">醫療紀錄 (${records.length})</h2>
        </div>
        <div class="p-6 space-y-4">
          ${records.length === 0
            ? '<p class="text-center text-gray-400 text-sm py-8">尚無醫療紀錄</p>'
            : records.map(r => `
              <div class="border border-gray-200 rounded-lg p-6 hover:shadow-sm transition-shadow">
                <div class="flex items-start justify-between mb-4">
                  <div>
                    <h3 class="text-gray-900 font-semibold">
                      ${r.type === 'emergency' ? '🚨 緊急事件' : '🏥 一般就醫'}
                    </h3>
                    <p class="text-gray-600 text-sm mt-1">${r.date || ''} ${r.time || ''}</p>
                  </div>
                  ${getStatusBadge(r.status)}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                  <div>
                    <p class="text-gray-500 mb-1">症狀</p>
                    <p class="text-gray-900">${r.symptom || '—'}</p>
                  </div>
                  <div>
                    <p class="text-gray-500 mb-1">醫院</p>
                    <p class="text-gray-900">${r.hospital || '—'}</p>
                  </div>
                  <div>
                    <p class="text-gray-500 mb-1">反應時間</p>
                    <p class="text-gray-900">${r.responseTime ? r.responseTime + ' 分鐘' : '—'}</p>
                  </div>
                  <div>
                    <p class="text-gray-500 mb-1">備註</p>
                    <p class="text-gray-900">${r.notes || '—'}</p>
                  </div>
                </div>
              </div>`).join('')}
        </div>
      </div>
    </div>` +
    layoutEnd();

  // Step 4: 初始化
  initIcons();
  initLogout();

  // Step 5: 緊急通報按鈕（3 秒倒數，倒數期間再點可取消）
  let countdown = null;

  function resetBtn() {
    clearInterval(countdown);
    countdown = null;
    const btn = document.getElementById('emergencyBtn');
    btn.textContent = '🚨 啟動緊急通報';
    btn.className = 'w-full px-8 py-6 bg-red-600 text-white rounded-xl hover:bg-red-700 transition-colors shadow-lg font-semibold text-lg';
    btn.disabled = false;
  }

  document.getElementById('emergencyBtn').addEventListener('click', async () => {
    const btn = document.getElementById('emergencyBtn');
    const msg = document.getElementById('emergencyMsg');

    // 倒數中再點 → 取消
    if (countdown) {
      resetBtn();
      msg.textContent = '⚠️ 緊急通報已取消。';
      msg.className = 'p-3 rounded-lg text-sm bg-yellow-50 text-yellow-800 border border-yellow-200';
      msg.classList.remove('hidden');
      return;
    }

    // 開始倒數
    let sec = 3;
    btn.textContent = `點擊取消（${sec}）`;
    btn.className = 'w-full px-8 py-6 bg-gray-500 text-white rounded-xl transition-colors shadow-lg font-semibold text-lg';
    msg.classList.add('hidden');

    countdown = setInterval(async () => {
      sec--;
      if (sec > 0) {
        btn.textContent = `點擊取消（${sec}）`;
      } else {
        clearInterval(countdown);
        countdown = null;
        btn.disabled = true;
        btn.textContent = '通報送出中...';

        try {
          await addDoc(collection(db, 'medical'), {
            uid:          user.uid,
            studentId:    sid,
            name,
            room,
            type:         'emergency',
            symptom:      '緊急求助（使用者手動觸發）',
            status:       'processing',
            responseTime: null,
            hospital:     '待確認',
            notes:        '由系統自動記錄',
            createdAt:    serverTimestamp()
          });
          msg.textContent = '✅ 緊急通報已送出！管理員即將收到通知。';
          msg.className = 'p-3 rounded-lg text-sm bg-green-50 text-green-800 border border-green-200';
          msg.classList.remove('hidden');
          setTimeout(() => location.reload(), 3000);
        } catch (err) {
          msg.textContent = '❌ 送出失敗：' + err.message;
          msg.className = 'p-3 rounded-lg text-sm bg-red-100 text-red-800';
          msg.classList.remove('hidden');
          resetBtn();
        }
      }
    }, 1000);
  });
});
</script>
</body>
</html>
