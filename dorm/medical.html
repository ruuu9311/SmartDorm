<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>醫療緊急通知 - 智慧宿舍系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body { font-family: 'Noto Sans TC', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

<div id="page">
  <div class="flex items-center justify-center min-h-screen flex-col gap-4 text-gray-400">
    <div class="w-8 h-8 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div>
    <p>載入中...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getFirestore, collection, getDocs, addDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAs6t5RsKjIr0mJEI6gnk579AIcG-_FJ_I",
    authDomain: "smartdorm-3ab79.firebaseapp.com",
    projectId: "smartdorm-3ab79",
    storageBucket: "smartdorm-3ab79.firebasestorage.app",
    messagingSenderId: "240227925869",
    appId: "1:240227925869:web:5a71f95a2f18bef1972464"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const studentId = localStorage.getItem('studentId');
  if (!studentId) {
    window.location.href = './login.html';
  }

  const cached    = JSON.parse(localStorage.getItem('currentUser') || 'null');
  const name      = cached?.name      || '使用者';
  const room      = cached?.room      || '—';
  const sid       = studentId;
  const bloodType = cached?.bloodType || '—';

  function getStatusBadge(status) {
    const map = {
      processing: '<span class="inline-flex items-center px-2.5 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-medium">處理中</span>',
      completed:  '<span class="inline-flex items-center px-2.5 py-1 bg-green-100 text-green-700 rounded-full text-xs font-medium">已完成</span>',
      pending:    '<span class="inline-flex items-center px-2.5 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">待處理</span>',
      cancelled:  '<span class="inline-flex items-center px-2.5 py-1 bg-red-100 text-red-700 rounded-full text-xs font-medium">已取消</span>'
    };
    return map[status] || `<span class="inline-flex items-center px-2.5 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">${status || '未知'}</span>`;
  }

  // ── 讀取資料 ──
  const snap = await getDocs(collection(db, 'medical'));
  let records = [];
  snap.forEach(d => {
    const data = d.data();
    if (data.studentId === sid) records.push({ id: d.id, ...data });
  });
  records.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

  // ── 渲染頁面 ──
  document.getElementById('page').innerHTML = `
    <div class="flex min-h-screen">
      <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed inset-y-0 left-0 z-10">
        <div class="p-6 border-b border-gray-100">
          <a href="./dashboard.html" class="flex items-center gap-3 rounded-lg px-2 py-1 -mx-2 hover:bg-blue-50 cursor-pointer transition-colors">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
              <i data-lucide="house" class="w-5 h-5 text-white"></i>
            </div>
            <div>
              <p class="font-semibold text-gray-900 text-sm">智慧宿舍系統</p>
              <p class="text-xs text-gray-400">Smart Dorm</p>
            </div>
          </a>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
          <a href="./dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> 首頁 Dashboard
          </a>
          <a href="./room-control.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="home" class="w-4 h-4"></i> 房間控制
          </a>
          <a href="./energy.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="zap" class="w-4 h-4"></i> 能源監控
          </a>
          <a href="./package.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="package" class="w-4 h-4"></i> 包裹管理
          </a>
          <a href="./maintenance.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="wrench" class="w-4 h-4"></i> 維修報修
          </a>
          <a href="./visitor.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="users" class="w-4 h-4"></i> 訪客管理
          </a>
          <a href="./medical.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-red-50 text-red-600 text-sm font-medium">
            <i data-lucide="heart-pulse" class="w-4 h-4"></i> 緊急通知
          </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
              <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">${name}</p>
              <p class="text-xs text-gray-400 truncate">${room}</p>
            </div>
          </div>
          <button id="logoutBtn" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-gray-500 hover:bg-red-50 hover:text-red-600 text-sm transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i> 登出
          </button>
        </div>
      </aside>

      <div class="flex-1 flex flex-col ml-64 min-h-screen">
        <header class="bg-gray-50 border-b border-gray-200 px-6 py-5 sticky top-0 z-10">
          <h1 class="text-xl font-bold text-gray-900">醫療緊急通知</h1>
          <p class="text-lg text-gray-500 mt-1">${room}｜${sid}</p>
        </header>

        <main class="p-6">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-gradient-to-br from-red-50 to-red-100 rounded-xl shadow-lg p-8 border border-red-200">
              <div class="text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-red-500 rounded-full mb-4">
                  <i data-lucide="heart" class="w-8 h-8 text-white"></i>
                </div>
                <h2 class="text-red-900 text-2xl font-semibold mb-3">緊急求助</h2>
                <p class="text-red-700 mb-6 text-sm">一鍵發送宿舍管理員與醫療單位通知</p>
                <div id="emergencyMsg" class="hidden mb-4 p-3 rounded-lg text-sm"></div>
                <button id="emergencyBtn" class="w-full px-8 py-6 bg-red-600 text-white rounded-xl hover:bg-red-700 transition-colors shadow-lg font-semibold text-lg">
                  🚨 啟動緊急通報
                </button>
                <p class="text-red-500 text-xs mt-3">按下後將啟動 3 秒倒數，再次點擊可取消</p>
              </div>
            </div>

            <div class="space-y-6">
              <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h3 class="text-gray-900 text-base font-semibold mb-4">緊急聯絡</h3>
                <div class="space-y-3 text-sm">
                  <div class="p-4 bg-red-50 rounded-lg font-medium text-red-800">🚑 119 緊急救護</div>
                  <div class="p-4 bg-blue-50 rounded-lg text-blue-800">📞 宿舍管理室：02-1234-5678</div>
                  <div class="p-4 bg-green-50 rounded-lg text-green-800">🏥 校園健康中心：02-8765-4321</div>
                </div>
              </div>
              <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h3 class="text-gray-900 text-base font-semibold mb-4">個人資料</h3>
                <div class="space-y-3 text-sm">
                  <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                    <span class="text-gray-600">姓名</span>
                    <span class="text-gray-900 font-medium">${name}</span>
                  </div>
                  <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                    <span class="text-gray-600">房號</span>
                    <span class="text-gray-900 font-medium">${room}</span>
                  </div>
                  <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                    <span class="text-gray-600">血型</span>
                    <span class="text-gray-900 font-medium">${bloodType}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-5 py-3.5 border-b border-gray-100 flex items-center gap-2">
              <i data-lucide="history" class="w-4 h-4 text-gray-400"></i>
              <h2 class="text-sm font-semibold text-gray-900">醫療紀錄</h2>
              <span class="ml-1 text-xs text-gray-400">(${records.length})</span>
            </div>
            <div class="p-6 space-y-4">
              ${records.length === 0
                ? '<p class="text-center text-gray-400 text-sm py-8">尚無醫療紀錄</p>'
                : records.map(r => `
                  <div class="border border-gray-200 rounded-lg p-6 hover:shadow-sm transition-shadow">
                    <div class="flex items-start justify-between mb-4">
                      <div>
                        <h3 class="text-gray-900 font-semibold">
                          ${r.type === 'emergency' ? '🚨 緊急事件' : '🏥 一般就醫'}
                        </h3>
                        <p class="text-gray-600 text-sm mt-1">${r.date || ''} ${r.time || ''}</p>
                      </div>
                      ${getStatusBadge(r.status)}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                      <div>
                        <p class="text-gray-500 mb-1">症狀</p>
                        <p class="text-gray-900">${r.symptom || '—'}</p>
                      </div>
                      <div>
                        <p class="text-gray-500 mb-1">醫院</p>
                        <p class="text-gray-900">${r.hospital || '—'}</p>
                      </div>
                      <div>
                        <p class="text-gray-500 mb-1">反應時間</p>
                        <p class="text-gray-900">${r.responseTime ? r.responseTime + ' 分鐘' : '—'}</p>
                      </div>
                      <div>
                        <p class="text-gray-500 mb-1">備註</p>
                        <p class="text-gray-900">${r.notes || '—'}</p>
                      </div>
                    </div>
                  </div>`).join('')}
            </div>
          </div>
        </main>
      </div>
    </div>
  `;

  // ── 事件綁定 ──
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = './login.html';
  });

  lucide.createIcons();

  let countdown = null;

  function resetBtn() {
    clearInterval(countdown);
    countdown = null;
    const btn = document.getElementById('emergencyBtn');
    btn.textContent = '🚨 啟動緊急通報';
    btn.className = 'w-full px-8 py-6 bg-red-600 text-white rounded-xl hover:bg-red-700 transition-colors shadow-lg font-semibold text-lg';
    btn.disabled = false;
  }

  document.getElementById('emergencyBtn').addEventListener('click', async () => {
    const btn = document.getElementById('emergencyBtn');
    const msg = document.getElementById('emergencyMsg');

    if (countdown) {
      resetBtn();
      msg.textContent = '⚠️ 緊急通報已取消。';
      msg.className = 'mb-4 p-3 rounded-lg text-sm bg-yellow-50 text-yellow-800 border border-yellow-200';
      msg.classList.remove('hidden');
      return;
    }

    let sec = 3;
    btn.textContent = `點擊取消（${sec}）`;
    btn.className = 'w-full px-8 py-6 bg-gray-500 text-white rounded-xl transition-colors shadow-lg font-semibold text-lg';
    msg.classList.add('hidden');

    countdown = setInterval(async () => {
      sec--;
      if (sec > 0) {
        btn.textContent = `點擊取消（${sec}）`;
      } else {
        clearInterval(countdown);
        countdown = null;
        btn.disabled = true;
        btn.textContent = '通報送出中...';

        await addDoc(collection(db, 'medical'), {
          studentId: sid,
          name,
          room,
          type: 'emergency',
          symptom: '緊急求助（使用者手動觸發）',
          status: 'processing',
          responseTime: null,
          hospital: '待確認',
          notes: '由系統自動記錄',
          createdAt: serverTimestamp()
        });

        msg.textContent = '✅ 緊急通報已送出！管理員即將收到通知。';
        msg.className = 'mb-4 p-3 rounded-lg text-sm bg-green-50 text-green-800 border border-green-200';
        msg.classList.remove('hidden');
        setTimeout(() => location.reload(), 2000);
      }
    }, 1000);
  });
</script>
</body>
</html>
