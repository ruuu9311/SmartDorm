<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./assets/app.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="page"></div>

  <script>
    document.getElementById('page').innerHTML =
      layoutStart('medical', '醫療緊急通知') +
      `
      <div class="p-6 max-w-6xl mx-auto">
        <div class="mb-8">
          <h1 class="text-3xl font-semibold text-gray-900 mb-2">醫療緊急通知</h1>
          <p class="text-gray-600">緊急求助與醫療紀錄中心</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
          <div class="bg-gradient-to-br from-red-50 to-red-100 rounded-xl shadow-lg p-8 border border-red-200">
            <div class="text-center">
              <div class="inline-flex items-center justify-center w-16 h-16 bg-red-500 rounded-full mb-4">
                <i data-lucide="heart" class="w-8 h-8 text-white"></i>
              </div>
              <h2 class="text-red-900 text-2xl font-semibold mb-3">緊急求助</h2>
              <p class="text-red-700 mb-6 text-sm">一鍵發送宿舍管理員與醫療單位通知</p>
              <button class="w-full px-8 py-6 bg-red-600 text-white rounded-xl hover:bg-red-700 shadow-lg">
                啟動 3 秒緊急通報
              </button>
            </div>
          </div>

          <div class="space-y-6">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
              <h3 class="text-gray-900 text-xl font-semibold mb-4">緊急聯絡</h3>
              <div class="space-y-3 text-sm">
                <div class="p-4 bg-red-50 rounded-lg">119 緊急救護</div>
                <div class="p-4 bg-blue-50 rounded-lg">宿舍管理室：02-1234-5678</div>
                <div class="p-4 bg-green-50 rounded-lg">校園健康中心：02-8765-4321</div>
              </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
              <h3 class="text-gray-900 text-xl font-semibold mb-4">個人資料</h3>
              <div class="space-y-3 text-sm">
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                  <span class="text-gray-600">姓名</span>
                  <span class="text-gray-900">${appState.user.name}</span>
                </div>
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                  <span class="text-gray-600">房號</span>
                  <span class="text-gray-900">${appState.user.room}</span>
                </div>
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                  <span class="text-gray-600">血型</span>
                  <span class="text-gray-900">O</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="p-6 border-b border-gray-200">
            <h2 class="text-xl font-semibold text-gray-900">醫療紀錄</h2>
          </div>
          <div class="p-6 space-y-4">
            ${mock.medicalRecords.map(record => `
              <div class="border border-gray-200 rounded-lg p-6 card-hover">
                <div class="flex items-start justify-between mb-4">
                  <div>
                    <h3 class="text-gray-900 font-semibold">${record.type === 'emergency' ? '緊急事件' : '一般就醫'}</h3>
                    <p class="text-gray-600 text-sm">${record.date} ${record.time}</p>
                  </div>
                  ${getStatusBadge(record.status)}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                  <div>
                    <p class="text-gray-600">症狀</p>
                    <p class="text-gray-900">${record.symptom}</p>
                  </div>
                  <div>
                    <p class="text-gray-600">醫院</p>
                    <p class="text-gray-900">${record.hospital}</p>
                  </div>
                  <div>
                    <p class="text-gray-600">反應時間</p>
                    <p class="text-gray-900">${record.responseTime} 分鐘</p>
                  </div>
                  <div>
                    <p class="text-gray-600">備註</p>
                    <p class="text-gray-900">${record.notes}</p>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      ` +
      layoutEnd();

    initLayout();
  </script>
</body>
</html>
