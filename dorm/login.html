<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 - 智慧宿舍管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
    .login-gradient {
      background: radial-gradient(circle at top right, #1e3a8a, #0f172a);
    }
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-bounce-slow { animation: bounce-slow 3s infinite ease-in-out; }
  </style>
</head>
<body class="login-gradient min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full glass-panel p-8 rounded-[2.5rem] shadow-2xl">
    <div class="text-center mb-10">
      <div class="inline-flex bg-blue-600 p-4 rounded-2xl shadow-lg shadow-blue-500/30 mb-4 animate-bounce-slow">
        <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
      </div>
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">智慧宿舍管理系統</h1>
      <p class="text-slate-400 text-sm mt-2">Dormitory Smart Management System</p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-widest">帳號 / 學號</label>
        <div class="relative group">
          <i data-lucide="user" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
          <input type="text" id="userId" placeholder="請輸入學號或管理員帳號" 
                 class="w-full bg-slate-50 border border-slate-200 p-4 pl-12 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all" required>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-widest">密碼</label>
        <div class="relative group">
          <i data-lucide="lock" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
          <input type="password" id="userPwd" placeholder="請輸入密碼" 
                 class="w-full bg-slate-50 border border-slate-200 p-4 pl-12 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all" required>
        </div>
      </div>

      <div id="errMsg" class="bg-red-50 text-red-600 text-xs font-bold p-4 rounded-xl text-center hidden flex items-center justify-center gap-2 border border-red-100">
        <i data-lucide="alert-circle" class="w-4 h-4"></i>
        <span id="errText"></span>
      </div>

      <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 active:scale-[0.98] transition-all shadow-xl shadow-blue-500/25 flex justify-center items-center gap-2">
        <span>安全登入系統</span>
        <i data-lucide="log-in" class="w-5 h-5"></i>
      </button>
    </form>

    <div class="mt-10 pt-6 border-t border-slate-100">
      <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
        <div class="flex items-center gap-1">
          <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
          FIREBASE CONNECTED
        </div>
        <div>V 2.1.1 BUILD (2026)</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    // 一進登入頁先清掉舊的登入資訊，避免身分殘留
    localStorage.clear();

    const firebaseConfig = { 
      apiKey: "AIzaSyAs6t5RsKjIr0mJEI6gnk579AIcG-_FJ_I", 
      authDomain: "smartdorm-3ab79.firebaseapp.com", 
      projectId: "smartdorm-3ab79", 
      storageBucket: "smartdorm-3ab79.firebasestorage.app", 
      messagingSenderId: "240227925869", 
      appId: "1:240227925869:web:5a71f95a2f18bef1972464" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');
    const errMsg = document.getElementById('errMsg');
    const errText = document.getElementById('errText');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
      // 阻止預設提交，避免整頁重整
      e.preventDefault(); 
      
      errMsg.classList.add('hidden');
      loginBtn.disabled = true;
      const originalContent = loginBtn.innerHTML;
      loginBtn.innerHTML = '<span class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></span>';

      const id = document.getElementById('userId').value.trim();
      const pwd = document.getElementById('userPwd').value;

      try {
        const userRef = doc(db, 'users', id);
        const userDoc = await getDoc(userRef);

        if (!userDoc.exists()) {
          throw new Error('找不到此帳號，請確認輸入是否正確');
        }

        const userData = userDoc.data();

        if (userData.password !== pwd) {
          throw new Error('密碼錯誤，請重新核對');
        }

        // ✅ 驗證成功：清空舊快取並寫入新權限
        localStorage.clear();

        // 給 admin 頁面原本使用的 key（保留你的設計）
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userId', id);
        localStorage.setItem('userName', userData.name);
        localStorage.setItem('userRole', userData.role);
        localStorage.setItem('userRoom', userData.room || '');

        // ✅ 新增：給 app.js 的 requireStudentAuth() 用
        localStorage.setItem('studentId', id);
        localStorage.setItem('currentUser', JSON.stringify({
          id: id,
          name: userData.name || '',
          room: userData.room || '',
          bed: userData.bed || '',
          class: userData.class || '',
          role: userData.role || 'student',
          phone: userData.phone || ''
        }));

        // 角色分流跳轉（轉小寫增加容錯率）
        const role = (userData.role || "").toLowerCase();
        
        if (role === 'admin') {
          window.location.replace('./admin-dashboard.html');
        } else if (role === 'student') {
          window.location.replace('./dashboard.html');
        } else {
          throw new Error('帳號權限異常 (' + role + ')，請聯繫管理員');
        }
      } catch (err) {
        errText.innerText = err.message;
        errMsg.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalContent;
        lucide.createIcons();
      }
    });

    lucide.createIcons();
  </script>
</body>
</html>
