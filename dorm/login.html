<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - 智慧宿舍系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div class="min-h-screen bg-gradient-to-br from-blue-50 to-blue-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4">
          <i data-lucide="house" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="text-3xl font-semibold text-blue-900 mb-2">智慧宿舍系統</h1>
        <p class="text-gray-600">Smart Dormitory Management System</p>
      </div>

      <div class="bg-white rounded-2xl shadow-xl p-8">
        <h2 class="text-2xl font-semibold text-gray-900 mb-6">登入</h2>

        <form action="./dashboard.html" class="space-y-5">
          <div>
            <label class="block text-gray-700 font-medium mb-2">學號</label>
            <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="請輸入學號">
          </div>

          <div>
            <label class="block text-gray-700 font-medium mb-2">密碼</label>
            <input type="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="請輸入密碼">
          </div>

          <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors font-medium">
            登入系統
          </button>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-200">
          <p class="text-gray-600 text-sm text-center mb-2">測試帳號</p>
          <div class="bg-gray-50 rounded-lg p-3 text-sm">
            <p class="text-gray-700">學號：<span class="text-gray-900">A110001</span></p>
            <p class="text-gray-700">密碼：<span class="text-gray-900">demo123</span></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>lucide.createIcons()</script>
</body>
</html>
