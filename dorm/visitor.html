<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪客管理 - 智慧宿舍系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body { font-family: 'Noto Sans TC', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

<div id="page">
  <div class="flex items-center justify-center min-h-screen flex-col gap-4 text-gray-400">
    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p>載入中...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getFirestore, collection, getDocs, addDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAs6t5RsKjIr0mJEI6gnk579AIcG-_FJ_I",
    authDomain: "smartdorm-3ab79.firebaseapp.com",
    projectId: "smartdorm-3ab79",
    storageBucket: "smartdorm-3ab79.firebasestorage.app",
    messagingSenderId: "240227925869",
    appId: "1:240227925869:web:5a71f95a2f18bef1972464"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const studentId = localStorage.getItem('studentId');
  if (!studentId) {
    window.location.href = './login.html';
  }

  const cached = JSON.parse(localStorage.getItem('currentUser') || 'null');
  const name = cached?.name || '使用者';
  const room = cached?.room || '—';
  const sid  = studentId;

  function getStatusBadge(status) {
    const map = {
      pending:  '<span class="inline-flex items-center px-2.5 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-medium">待審核</span>',
      approved: '<span class="inline-flex items-center px-2.5 py-1 bg-green-100 text-green-700 rounded-full text-xs font-medium">已核准</span>',
      rejected: '<span class="inline-flex items-center px-2.5 py-1 bg-red-100 text-red-700 rounded-full text-xs font-medium">已拒絕</span>'
    };
    return map[status] || `<span class="inline-flex items-center px-2.5 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">${status || '未知'}</span>`;
  }

  // ── 讀取資料 (移除 try...catch) ──
  const snap = await getDocs(collection(db, 'visitor'));
  let visitors = [];
  snap.forEach(d => {
    const data = d.data();
    if (data.studentId === sid) visitors.push({ id: d.id, ...data });
  });
  visitors.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

  const pendingCount  = visitors.filter(v => v.status === 'pending').length;
  const approvedCount = visitors.filter(v => v.status === 'approved').length;
  const rejectedCount = visitors.filter(v => v.status === 'rejected').length;

  // ── 渲染頁面 ──
  document.getElementById('page').innerHTML = `
    <div class="flex min-h-screen">
      <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed inset-y-0 left-0 z-10">
        <div class="p-6 border-b border-gray-100">
          <a href="./dashboard.html" class="flex items-center gap-3 rounded-lg px-2 py-1 -mx-2 hover:bg-blue-50 cursor-pointer transition-colors">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
              <i data-lucide="house" class="w-5 h-5 text-white"></i>
            </div>
            <div>
              <p class="font-semibold text-gray-900 text-sm">智慧宿舍系統</p>
              <p class="text-xs text-gray-400">Smart Dorm</p>
            </div>
          </a>
        </div>

        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
          <a href="./dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> 首頁 Dashboard
          </a>
          <a href="./room-control.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="home" class="w-4 h-4"></i> 房間控制
          </a>
          <a href="./energy.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="zap" class="w-4 h-4"></i> 能源監控
          </a>
          <a href="./package.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="package" class="w-4 h-4"></i> 包裹管理
          </a>
          <a href="./maintenance.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="wrench" class="w-4 h-4"></i> 維修報修
          </a>
          <a href="./visitor.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 text-blue-600 text-sm font-medium">
            <i data-lucide="users" class="w-4 h-4"></i> 訪客管理
          </a>
          <a href="./medical.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="heart-pulse" class="w-4 h-4"></i> 緊急通知
          </a>
        </nav>

        <div class="p-4 border-t border-gray-100">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
              <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">${name}</p>
              <p class="text-xs text-gray-400 truncate">${room}</p>
            </div>
          </div>
          <button id="logoutBtn" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-gray-500 hover:bg-red-50 hover:text-red-600 text-sm transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i> 登出
          </button>
        </div>
      </aside>

      <div class="flex-1 flex flex-col ml-64 min-h-screen">
        <header class="bg-gray-50 border-b border-gray-200 px-6 py-5 sticky top-0 z-10">
          <h1 class="text-xl font-bold text-gray-900">訪客管理</h1>
          <p class="text-lg text-gray-500 mt-1">${room}｜${sid}</p>
        </header>

        <main class="p-6">
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5 mb-6">
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-lg bg-yellow-50 flex items-center justify-center">
                  <i data-lucide="clock-3" class="w-5 h-5 text-yellow-600"></i>
                </div>
                <span class="text-xs font-medium text-yellow-600">待審核</span>
              </div>
              <p class="text-gray-500 text-sm mb-1">待審核申請</p>
              <p class="text-2xl font-bold text-gray-900">${pendingCount} <span class="text-sm font-normal text-gray-400">筆</span></p>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-lg bg-green-50 flex items-center justify-center">
                  <i data-lucide="badge-check" class="w-5 h-5 text-green-600"></i>
                </div>
                <span class="text-xs font-medium text-green-600">已核准</span>
              </div>
              <p class="text-gray-500 text-sm mb-1">核准申請</p>
              <p class="text-2xl font-bold text-gray-900">${approvedCount} <span class="text-sm font-normal text-gray-400">筆</span></p>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-lg bg-red-50 flex items-center justify-center">
                  <i data-lucide="shield-x" class="w-5 h-5 text-red-500"></i>
                </div>
                <span class="text-xs font-medium text-red-500">已拒絕</span>
              </div>
              <p class="text-gray-500 text-sm mb-1">拒絕申請</p>
              <p class="text-2xl font-bold text-gray-900">${rejectedCount} <span class="text-sm font-normal text-gray-400">筆</span></p>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center">
                  <i data-lucide="users" class="w-5 h-5 text-blue-600"></i>
                </div>
                <span class="text-xs font-medium text-blue-600">總計</span>
              </div>
              <p class="text-gray-500 text-sm mb-1">申請總數</p>
              <p class="text-2xl font-bold text-gray-900">${visitors.length} <span class="text-sm font-normal text-gray-400">筆</span></p>
            </div>
          </div>

          <div class="bg-blue-50 border border-blue-100 rounded-xl p-5 mb-6">
            <div class="flex items-center gap-2 mb-3">
              <i data-lucide="info" class="w-4 h-4 text-blue-600"></i>
              <h3 class="text-sm font-semibold text-blue-800">訪客登記須知</h3>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-2 text-sm text-blue-700">
              <div class="flex items-start gap-2"><span>✓ 訪客需提前登記，經審核通過後方可進入</span></div>
              <div class="flex items-start gap-2"><span>✓ 住宿生需親自至管理中心接待訪客</span></div>
              <div class="flex items-start gap-2"><span>✓ 訪客時間為每日 08:00 - 22:00</span></div>
              <div class="flex items-start gap-2"><span>✓ 離舍需至管理中心登記</span></div>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div class="px-5 py-3.5 border-b border-gray-100 flex items-center gap-2">
                <i data-lucide="file-text" class="w-4 h-4 text-gray-400"></i>
                <h2 class="text-sm font-semibold text-gray-900">訪客登記表單</h2>
              </div>

              <form id="vForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">住宿生房號</label>
                  <input type="text" value="${room}" readonly class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-600 cursor-not-allowed">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">訪客姓名 <span class="text-red-500">*</span></label>
                  <input id="vName" type="text" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入訪客姓名">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">訪客電話 <span class="text-red-500">*</span></label>
                  <input id="vPhone" type="tel" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0912-345-678">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">預計來訪日期 <span class="text-red-500">*</span></label>
                  <input id="vDate" type="date" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">預計來訪時間 <span class="text-red-500">*</span></label>
                  <input id="vTime" type="time" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">入舍原因 <span class="text-red-500">*</span></label>
                  <select id="vReason" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    <option value="" disabled selected>請選擇原因</option>
                    <option value="探訪朋友">探訪朋友</option>
                    <option value="家長探視">家長探視</option>
                    <option value="討論課業">討論課業</option>
                    <option value="協助搬運">協助搬運</option>
                    <option value="其他">其他</option>
                  </select>
                </div>
                <div id="vMsg" class="md:col-span-2 hidden p-3 rounded-lg text-sm"></div>
                <div class="md:col-span-2 flex gap-3">
                  <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium text-sm">提交申請</button>
                  <button type="reset" class="px-8 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm">取消</button>
                </div>
              </form>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex flex-col justify-between">
              <div>
                <h3 class="text-sm font-semibold text-gray-900 mb-4 flex items-center gap-2">
                  <i data-lucide="bar-chart-3" class="w-4 h-4"></i> 我的申請狀況
                </h3>
                <div class="space-y-3">
                  <div class="flex items-center justify-between p-3 bg-yellow-50 rounded-lg text-sm">
                    <span class="text-yellow-700">待審核</span>
                    <span class="font-bold text-yellow-600">${pendingCount}</span>
                  </div>
                  <div class="flex items-center justify-between p-3 bg-green-50 rounded-lg text-sm">
                    <span class="text-green-700">已核准</span>
                    <span class="font-bold text-green-600">${approvedCount}</span>
                  </div>
                  <div class="flex items-center justify-between p-3 bg-red-50 rounded-lg text-sm">
                    <span class="text-red-700">已拒絕</span>
                    <span class="font-bold text-red-500">${rejectedCount}</span>
                  </div>
                </div>
              </div>
              <div class="mt-4 p-3 bg-gray-50 rounded-lg text-xs text-gray-500">
                ⚠️ 來訪時間請安排在宿舍開放時段內 (08:00-22:00)。
              </div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-5 py-3.5 border-b border-gray-100 flex items-center gap-2">
              <i data-lucide="history" class="w-4 h-4 text-gray-400"></i>
              <h2 class="text-sm font-semibold text-gray-900">我的申請紀錄</h2>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="border-b border-gray-100 bg-gray-50/50">
                    <th class="text-left py-3 px-4 text-gray-400 font-medium text-xs">訪客姓名</th>
                    <th class="text-left py-3 px-4 text-gray-400 font-medium text-xs">日期</th>
                    <th class="text-left py-3 px-4 text-gray-400 font-medium text-xs">時間</th>
                    <th class="text-left py-3 px-4 text-gray-400 font-medium text-xs">原因</th>
                    <th class="text-left py-3 px-4 text-gray-400 font-medium text-xs">狀態</th>
                  </tr>
                </thead>
                <tbody>
                  ${visitors.length === 0
                    ? '<tr><td colspan="5" class="py-10 text-center text-gray-400 text-sm">尚無申請紀錄</td></tr>'
                    : visitors.map(v => `
                      <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <td class="py-3 px-4 font-medium text-gray-900">${v.visitorName || '—'}</td>
                        <td class="py-3 px-4 text-gray-600">${v.date || '—'}</td>
                        <td class="py-3 px-4 text-gray-600">${v.visitTime || '—'}</td>
                        <td class="py-3 px-4 text-gray-600">${v.reason || '—'}</td>
                        <td class="py-3 px-4">${getStatusBadge(v.status)}</td>
                      </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
  `;

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = './login.html';
  });

  lucide.createIcons();

  document.getElementById('vForm').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = document.getElementById('vMsg');
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = '送出中...';
    btn.disabled = true;

    await addDoc(collection(db, 'visitor'), {
      studentId: sid,
      hostName: name,
      room: room,
      visitorName: document.getElementById('vName').value.trim(),
      phone: document.getElementById('vPhone').value.trim(),
      date: document.getElementById('vDate').value,
      visitTime: document.getElementById('vTime').value,
      reason: document.getElementById('vReason').value,
      status: 'pending',
      createdAt: serverTimestamp()
    });

    msg.textContent = '✅ 申請已送出！';
    msg.className = 'md:col-span-2 p-3 rounded-lg text-sm bg-green-50 text-green-700 border border-green-200';
    msg.classList.remove('hidden');
    setTimeout(() => location.reload(), 1500);
  });
</script>
</body>
</html>
