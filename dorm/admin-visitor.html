<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪客審核系統 - 管理端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body { font-family: 'Noto Sans TC', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">

  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-2xl font-bold flex items-center gap-2">
          <i data-lucide="user-check" class="text-purple-600"></i> 訪客申請審核
        </h1>
        <p class="text-slate-500 text-sm mt-1">即時處理學生提出的訪客進入申請</p>
      </div>
      <a href="./admin-dashboard.html" class="flex items-center gap-2 text-slate-600 hover:text-blue-600 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i> 返回儀表板
      </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2">
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
            <span class="font-bold text-slate-700">待處理申請</span>
            <span id="pendingCount" class="bg-purple-100 text-purple-700 text-xs px-3 py-1 rounded-full font-bold">0 件</span>
          </div>
          <div id="pendingList" class="divide-y divide-slate-100">
            <div class="p-20 text-center text-slate-400">正在同步申請資料...</div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-1">
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="p-5 bg-slate-50 border-b font-bold text-slate-700">最近審核紀錄</div>
          <div id="historyList" class="divide-y divide-slate-50 text-sm">
            </div>
        </div>
      </div>
    </div>
  </div>

  
  <!-- 訪客詳細資料 Modal -->
  <div id="visitorModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700 transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
      <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
        <i data-lucide="user" class="text-purple-500 w-5 h-5"></i> 訪客詳細資料
      </h2>
      <div id="modalContent" class="space-y-4 text-sm"></div>
      <div id="modalActions" class="mt-6 flex gap-3"></div>
    </div>
  </div>

  <audio id="alarmAudio" src="https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3" preload="auto"></audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, doc, onSnapshot, updateDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = { 
      apiKey: "AIzaSyAs6t5RsKjIr0mJEI6gnk579AIcG-_FJ_I", 
      authDomain: "smartdorm-3ab79.firebaseapp.com", 
      projectId: "smartdorm-3ab79", 
      storageBucket: "smartdorm-3ab79.firebasestorage.app", 
      messagingSenderId: "240227925869", 
      appId: "1:240227925869:web:5a71f95a2f18bef1972464" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. 權限檢查
    if (localStorage.getItem('userRole') !== 'admin') window.location.href = './login.html';

    // 2. 全域緊急醫療監聽
    const alarm = document.getElementById('alarmAudio');
    onSnapshot(query(collection(db, 'medical'), where('status', '==', 'processing')), snap => {
      if (!snap.empty) {
        alarm.play().catch(() => {});
        const data = snap.docs[0].data();
        if(confirm(`🚨 【緊急求助】\n\n房號：${data.room}\n姓名：${data.name}\n\n是否立即前往處理？`)) window.location.href = './admin-medical.html';
      }
    });

    // 3. 監聽待審核名單 (status == pending)
    onSnapshot(query(collection(db, 'visitor'), where('status', '==', 'pending')), snap => {
      const list = document.getElementById('pendingList');
      document.getElementById('pendingCount').innerText = `${snap.size} 件`;

      const sorted = snap.docs.sort((a, b) => {
        const ta = a.data().timestamp?.toMillis?.() || 0;
        const tb = b.data().timestamp?.toMillis?.() || 0;
        return tb - ta;
      });
      list.innerHTML = sorted.map(d => {
        const v = d.data();
        return `
          <div class="p-6 hover:bg-slate-50 transition-all">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="text-xs font-bold text-purple-600 bg-purple-50 px-2 py-1 rounded">預計抵達：${v.date} ${v.visitTime}</span>
                <h3 class="text-xl font-bold text-slate-800 mt-2">${v.visitorName}</h3>
                <p class="text-sm text-slate-500">拜訪對象：${v.hostName} (房號：${v.room})</p>
              </div>
              <div class="flex gap-2 flex-wrap justify-end">
                <button onclick='showDetail({...${JSON.stringify("__PLACEHOLDER__")}, id: "${d.id}"})' 
                  class="hidden" id="detail-btn-${d.id}"></button>
                <button onclick="showDetail({visitorName:'${v.visitorName}',phone:'${v.phone||""}',idLast4:'${v.idLast4||""}',hostName:'${v.hostName}',room:'${v.room}',date:'${v.date}',visitTime:'${v.visitTime}',reason:'${(v.reason||"").replace(/'/g,"")}',status:'${v.status}',auditTime:'${v.auditTime||""}',id:'${d.id}'})" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-xl font-bold hover:bg-slate-200 transition-all text-sm">詳細</button>
                <button onclick="auditVisitor('${d.id}', 'approved')" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">核准</button>
                <button onclick="auditVisitor('${d.id}', 'rejected')" class="bg-slate-100 text-slate-500 px-5 py-2 rounded-xl font-bold hover:bg-red-50 hover:text-red-600 transition-all">拒絕</button>
              </div>
            </div>
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
              <p class="text-xs text-slate-400 mb-1">拜訪事由</p>
              <p class="text-sm text-slate-600 italic">${v.reason || '未提供事由'}</p>
            </div>
          </div>
        `;
      }).join('') || '<div class="p-20 text-center text-slate-400 italic">目前沒有待審核的訪客申請</div>';
    });

    // 4. 監聽最近紀錄 (最近審核過的 10 筆)
    onSnapshot(query(collection(db, 'visitor'), where('status', 'in', ['approved', 'rejected'])), snap => {
      const list = document.getElementById('historyList');
      const sortedH = snap.docs.sort((a, b) => {
        const ta = a.data().timestamp?.toMillis?.() || 0;
        const tb = b.data().timestamp?.toMillis?.() || 0;
        return tb - ta;
      });
      list.innerHTML = sortedH.slice(0, 10).map(d => {
        const v = d.data();
        const isApprove = v.status === 'approved';
        return `
          <div class="p-4 bg-white flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors" onclick='showDetail(${JSON.stringify({...v, id: d.id})})'>
            <div>
              <p class="font-medium text-slate-700">${v.visitorName}</p>
              <p class="text-[10px] text-slate-400">對象：${v.hostName}｜${v.date || ''}</p>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs font-bold ${isApprove ? 'text-emerald-500' : 'text-red-400'}">
                ${isApprove ? '已核准' : '已拒絕'}
              </span>
              <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i>
            </div>
          </div>
        `;
      }).join('') || '<div class="p-10 text-center text-slate-300">無歷史紀錄</div>';
    });

    // 5. 審核功能
    window.auditVisitor = async (id, result) => {
      const actionText = result === 'approved' ? '核准進入' : '拒絕此申請';
      if(confirm(`確定要 ${actionText} 嗎？`)) {
        await updateDoc(doc(db, 'visitor', id), {
          status: result,
          auditTime: new Date().toLocaleString('zh-TW')
        });
      }
    };


    // 顯示詳細資料 Modal
    window.showDetail = (v) => {
      const isApprove = v.status === 'approved';
      const isPending = v.status === 'pending';
      document.getElementById('modalContent').innerHTML = `
        <div class="bg-purple-50 rounded-2xl p-4 space-y-2">
          <div class="flex justify-between">
            <span class="text-slate-400">訪客姓名</span>
            <span class="font-bold text-slate-800">${v.visitorName || '-'}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-slate-400">聯絡電話</span>
            <span class="font-medium text-slate-700">${v.phone || '-'}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-slate-400">身分證末四碼</span>
            <span class="font-medium text-slate-700">${v.idLast4 || '-'}</span>
          </div>
        </div>
        <div class="bg-slate-50 rounded-2xl p-4 space-y-2">
          <div class="flex justify-between">
            <span class="text-slate-400">拜訪對象</span>
            <span class="font-medium text-slate-700">${v.hostName || '-'}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-slate-400">房號</span>
            <span class="font-medium text-slate-700">${v.room || '-'}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-slate-400">預計抵達</span>
            <span class="font-medium text-slate-700">${v.date || '-'} ${v.visitTime || ''}</span>
          </div>
        </div>
        <div class="bg-slate-50 rounded-2xl p-4">
          <p class="text-slate-400 mb-1">拜訪事由</p>
          <p class="text-slate-700 italic">${v.reason || '未提供事由'}</p>
        </div>
        <div class="flex justify-between items-center px-1">
          <span class="text-slate-400">審核狀態</span>
          <span class="font-bold px-3 py-1 rounded-full text-xs ${isPending ? 'bg-yellow-100 text-yellow-700' : isApprove ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-600'}">
            ${isPending ? '待審核' : isApprove ? '已核准' : '已拒絕'}
          </span>
        </div>
        ${v.auditTime ? `<div class="flex justify-between items-center px-1"><span class="text-slate-400">審核時間</span><span class="text-slate-600 text-xs">${v.auditTime}</span></div>` : ''}
      `;
      // 若是待審核，在 modal 也可直接核准/拒絕
      document.getElementById('modalActions').innerHTML = isPending && v.id ? `
        <button onclick="auditVisitor('${v.id}','approved');closeModal()" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold hover:bg-blue-700 transition-all">核准</button>
        <button onclick="auditVisitor('${v.id}','rejected');closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold hover:bg-red-50 hover:text-red-600 transition-all">拒絕</button>
      ` : `<button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold hover:bg-slate-200 transition-all">關閉</button>`;
      document.getElementById('visitorModal').classList.remove('hidden');
      lucide.createIcons();
    };

    window.closeModal = () => {
      document.getElementById('visitorModal').classList.add('hidden');
    };

    // 點擊背景關閉 Modal
    document.getElementById('visitorModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

        lucide.createIcons();
  </script>
</body>
</html>
