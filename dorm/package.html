<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>包裹管理 - 智慧宿舍系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body { font-family: 'Noto Sans TC', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

<div id="page">
  <div class="flex items-center justify-center min-h-screen flex-col gap-4 text-gray-400">
    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p>載入中...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAs6t5RsKjIr0mJEI6gnk579AIcG-_FJ_I",
    authDomain: "smartdorm-3ab79.firebaseapp.com",
    projectId: "smartdorm-3ab79",
    storageBucket: "smartdorm-3ab79.firebasestorage.app",
    messagingSenderId: "240227925869",
    appId: "1:240227925869:web:5a71f95a2f18bef1972464"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── 1. 登入狀態檢查 ──────────────────────────────────────────────────────
  const studentId = localStorage.getItem('studentId');
  if (!studentId) {
    window.location.href = './login.html';
    throw new Error('未登入');
  }
  const cached = JSON.parse(localStorage.getItem('currentUser') || 'null');
  const name = cached?.name || '使用者';
  const room = cached?.room || '—';
  const sid  = studentId;

  // ── 2. 狀態標籤輔助函式 ──────────────────────────────────────────────────
  function getStatusBadge(status) {
    const map = {
      waiting: '<span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full text-xs font-medium">待領取</span>',
      picked:  '<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded-full text-xs font-medium">已領取</span>',
      expired: '<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded-full text-xs font-medium">已逾期</span>'
    };
    return map[status] || `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">${status || '未知'}</span>`;
  }

  // ── 3. 讀取包裹資料 ──────────────────────────────────────────────────────
  let packages = [];
  try {
    const snap = await getDocs(collection(db, 'packages'));
    snap.forEach(d => packages.push({ id: d.id, ...d.data() }));
  } catch (err) {
    console.warn('[packages] 讀取失敗:', err.code);
  }

  const waiting = packages.filter(p => p.status === 'waiting');
  const picked  = packages.filter(p => p.status === 'picked');

  // ── 4. 渲染頁面 ──────────────────────────────────────────────────────────
  document.getElementById('page').innerHTML = `
    <div class="flex min-h-screen">

      <!-- 側邊欄 -->
      <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed inset-y-0 left-0 z-10">
        <div class="p-6 border-b border-gray-100">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
              <i data-lucide="house" class="w-5 h-5 text-white"></i>
            </div>
            <div>
              <p class="font-semibold text-gray-900 text-sm">智慧宿舍系統</p>
              <p class="text-xs text-gray-400">Smart Dorm</p>
            </div>
          </div>
        </div>

        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
          <a href="./dashboard.html"
             class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> 首頁 Dashboard
          </a>
          <a href="./room-control.html"
             class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="home" class="w-4 h-4"></i> 房間控制
          </a>
          <a href="./energy.html"
             class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="zap" class="w-4 h-4"></i> 能源監控
          </a>
          <a href="./package.html"
             class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 text-blue-600 text-sm font-medium">
            <i data-lucide="package" class="w-4 h-4"></i> 包裹管理
          </a>
          <a href="./maintenance.html"
             class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="wrench" class="w-4 h-4"></i> 維修報修
          </a>
          <a href="./visitor.html"
             class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="users" class="w-4 h-4"></i> 訪客管理
          </a>
          <a href="./medical.html"
             class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 text-sm transition-colors">
            <i data-lucide="heart-pulse" class="w-4 h-4"></i> 緊急通知
          </a>
        </nav>

        <div class="p-4 border-t border-gray-100">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
              <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">${name}</p>
              <p class="text-xs text-gray-400 truncate">${room}</p>
            </div>
          </div>
          <button id="logoutBtn"
            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-gray-500
                   hover:bg-red-50 hover:text-red-600 text-sm transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i> 登出
          </button>
        </div>
      </aside>

      <!-- 主內容 -->
      <div class="flex-1 flex flex-col ml-64 min-h-screen">
        <header class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-10">
          <h1 class="text-xl font-semibold text-gray-900">包裹管理</h1>
          <p class="text-sm text-gray-400">${room}｜${sid}</p>
        </header>

        <main class="p-6 max-w-6xl mx-auto w-full">
          <div class="mb-8">
            <h1 class="text-3xl font-semibold text-gray-900 mb-2">包裹管理</h1>
            <p class="text-gray-600">宿舍包裹收件與領取紀錄</p>
          </div>

          <!-- 待領取 -->
          <div class="mb-8">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">
              待領取
              <span class="ml-2 px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full text-sm font-medium">${waiting.length}</span>
            </h2>
            ${waiting.length === 0
              ? `<div class="bg-white rounded-xl p-8 text-center border border-dashed border-gray-300 text-gray-400 text-sm">
                   目前沒有待領取的包裹
                 </div>`
              : `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                   ${waiting.map(pkg => `
                     <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 hover:shadow-md transition-shadow">
                       <div class="flex items-center justify-between mb-3">
                         <h3 class="text-gray-900 font-semibold">${pkg.trackingNumber || '—'}</h3>
                         ${getStatusBadge(pkg.status)}
                       </div>
                       <div class="text-gray-600 text-sm space-y-1">
                         ${pkg.courier         ? `<p>📦 物流：${pkg.courier}</p>` : ''}
                         ${pkg.storageLocation ? `<p>📍 存放位置：${pkg.storageLocation}</p>` : ''}
                         ${pkg.arrivalDate     ? `<p>🕐 到達：${pkg.arrivalDate} ${pkg.arrivalTime || ''}</p>` : ''}
                       </div>
                     </div>`).join('')}
                 </div>`}
          </div>

          <!-- 已領取紀錄 -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-200">
              <h2 class="text-xl font-semibold text-gray-900">
                已領取紀錄
                <span class="ml-2 text-gray-400 text-base font-normal">(${picked.length})</span>
              </h2>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="text-left py-3 px-4 text-gray-600 font-medium">單號</th>
                    <th class="text-left py-3 px-4 text-gray-600 font-medium">物流商</th>
                    <th class="text-left py-3 px-4 text-gray-600 font-medium">存放位置</th>
                    <th class="text-left py-3 px-4 text-gray-600 font-medium">領取時間</th>
                    <th class="text-left py-3 px-4 text-gray-600 font-medium">狀態</th>
                  </tr>
                </thead>
                <tbody>
                  ${picked.length === 0
                    ? '<tr><td colspan="5" class="py-8 text-center text-gray-400">尚無已領取紀錄</td></tr>'
                    : picked.map(pkg => `
                      <tr class="border-b border-gray-100 hover:bg-gray-50">
                        <td class="py-3 px-4 font-medium">${pkg.trackingNumber || '—'}</td>
                        <td class="py-3 px-4 text-gray-600">${pkg.courier || '—'}</td>
                        <td class="py-3 px-4 text-gray-600">${pkg.storageLocation || '—'}</td>
                        <td class="py-3 px-4 text-gray-600">${pkg.pickupDate || '—'} ${pkg.pickupTime || ''}</td>
                        <td class="py-3 px-4">${getStatusBadge(pkg.status)}</td>
                      </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
  `;

  // ── 5. 登出按鈕 ──────────────────────────────────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = './login.html';
  });

  lucide.createIcons();
</script>
</body>
</html>
