<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./assets/app.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="page"></div>

  <script>
    const waitingPackages = mock.packages.filter(p => p.status === 'waiting');
    const pickedPackages = mock.packages.filter(p => p.status === 'picked');

    document.getElementById('page').innerHTML =
      layoutStart('package', '包裹管理') +
      `
      <div class="p-6 max-w-6xl mx-auto">
        <div class="mb-8">
          <h1 class="text-3xl font-semibold text-gray-900 mb-2">包裹管理</h1>
          <p class="text-gray-600">宿舍包裹收件與領取紀錄</p>
        </div>

        <div class="grid grid-cols-1 gap-4 mb-8">
          ${waitingPackages.map(pkg => `
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 card-hover">
              <div class="flex items-center justify-between mb-2">
                <h3 class="text-gray-900 font-semibold">${pkg.trackingNumber}</h3>
                ${getStatusBadge(pkg.status)}
              </div>
              <p class="text-gray-600 text-sm">${pkg.courier}｜${pkg.storageLocation}｜${pkg.arrivalDate} ${pkg.arrivalTime}</p>
            </div>
          `).join('')}
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="p-6 border-b border-gray-200">
            <h2 class="text-xl font-semibold text-gray-900">已領取紀錄</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="text-left py-3 px-4 text-gray-600">單號</th>
                  <th class="text-left py-3 px-4 text-gray-600">物流</th>
                  <th class="text-left py-3 px-4 text-gray-600">領取時間</th>
                  <th class="text-left py-3 px-4 text-gray-600">狀態</th>
                </tr>
              </thead>
              <tbody>
                ${pickedPackages.map(pkg => `
                  <tr class="border-b border-gray-100">
                    <td class="py-3 px-4">${pkg.trackingNumber}</td>
                    <td class="py-3 px-4">${pkg.courier}</td>
                    <td class="py-3 px-4">${pkg.pickupDate} ${pkg.pickupTime}</td>
                    <td class="py-3 px-4">${getStatusBadge(pkg.status)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      ` +
      layoutEnd();

    initLayout();
  </script>
</body>
</html>
